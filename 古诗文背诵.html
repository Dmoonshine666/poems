<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古诗文背诵系统</title>
    <style>
        :root {
            --primary: #6D9197;
            --secondary: #8BA691;
            --accent: #D4B483;
            --text: #2E2E2E;
        }

        body {
            margin: 0;
            min-height: 100vh;
            /* 说明：
               - Windows 常见：楷体 / KaiTi
               - iOS/macOS 常见：STKaiti / Kaiti SC
               如果设备没有该字体，会自动回退到后面的字体。*/
            font-family: "楷体", "KaiTi", "Kaiti", "Kaiti SC", "STKaiti", "BiauKai", "Songti SC", serif;
            background: var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            text-align: center;
            width: 90%;
            max-width: 1200px;
        }

        h1 {
            color: var(--secondary);
            font-size: clamp(2rem, 4vw, 3rem);
            margin-bottom: 2rem;
        }

        .btn-group {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            position: relative;
        }

        button {
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            font-size: 1.2rem;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .checkBtn {
            background: var(--accent);
            color: white;
            width: 180px;
            height: 60px; /* 固定按钮高度 */
            white-space: nowrap; /* 防止文本换行 */
            text-overflow: ellipsis; /* 超出部分用省略号表示 */
            overflow: hidden; /* 隐藏超出部分 */
        }

        .checkBtn.active {
            animation: pulse 1.5s infinite;
        }

        #showAnswer {
            background: var(--secondary);
            color: white;
            letter-spacing: 0.5em;
            padding-right: 1.5rem;
        }

        #result {
            position: relative;
            width: calc(100vw * 2 / 3);
            max-width: 800px;
            height: 300px;
            margin: 1rem auto;
            padding: 2rem;
            padding-right: 3rem;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: auto;
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: center;
            font-size: 1.8rem;
            text-align: center;
            line-height: 1.6;
            transition: all 0.3s;
        }

        #result.answer-mode {
            align-items: flex-start;
            justify-content: flex-start;
            text-align: left;
        }

        #resultText {
            flex: 1;
            width: 100%;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: inherit;
        }

        #result.answer-mode #resultText {
            align-items: flex-start;
            justify-content: flex-start;
            text-align: left;
        }

        .speak-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            z-index: 2;
            width: 2.5rem;
            height: 2.5rem;
            padding: 0;
            margin: 0;
            border: none;
            border-radius: 50%;
            background: var(--secondary);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s, background 0.2s;
            flex-shrink: 0;
        }

        .speak-btn:hover {
            background: var(--primary);
            transform: scale(1.06);
        }

        .speak-btn:active {
            transform: scale(0.96);
        }

        .speak-btn.speak-btn--hidden {
            visibility: hidden;
            pointer-events: none;
        }

        .speak-btn.speak-btn--playing {
            background: var(--accent);
        }

        .speak-btn svg {
            width: 1.35rem;
            height: 1.35rem;
            fill: currentColor;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            button {
                width: 100%;
            }

            .checkBtn {
                height: auto;
                padding: 1rem;
            }

            #result {
                width: 90%;
                height: 200px;
                font-size: 1.5rem;
                padding: 1rem;
                padding-right: 2.75rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>古诗文背诵系统</h1>
        <div class="btn-group">
            <!-- 替换为两个按钮 -->
            <button id="gushiBtn" class="checkBtn" onclick="toggleCheck('古诗词')">古诗词</button>
            <button id="wenyanBtn" class="checkBtn" onclick="toggleCheck('文言文')">文言文</button>
            <button id="showAnswer" onclick="showAnswer()">显示答案</button>
        </div>
        <div id="result">
            <button type="button" id="speakBtn" class="speak-btn speak-btn--hidden" aria-label="朗读全文" title="朗读全文">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9v6h4l5 4V5L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            </button>
            <div id="resultText">请点击上方按钮开始抽查</div>
        </div>
    </div>

    <script>
        // 完整诗词库（包含古诗词和文言文）
        const poems = [
            {
                "title": "咏鹅",
                "content": "《咏鹅》\n唐·骆宾王\n鹅，鹅，鹅，曲项向天歌。\n白毛浮绿水，红掌拨清波。",
                "type": "古诗词"
            },
            {
                "title": "江南",
                "content": "《江南》\n汉乐府\n江南可采莲，莲叶何田田。\n鱼戏莲叶间。\n鱼戏莲叶东，鱼戏莲叶西，\n鱼戏莲叶南，鱼戏莲叶北。",
                "type": "古诗词"
            },
            {
                "title": "画",
                "content": "《画》\n佚名\n远看山有色，近听水无声。\n春去花还在，人来鸟不惊。",
                "type": "古诗词"
            },
            {
                "title": "悯农(其二)",
                "content": "《悯农(其二)》\n唐·李绅\n锄禾日当午，汗滴禾下土。\n谁知盘中餐，粒粒皆辛苦。",
                "type": "古诗词"
            },
            {
                "title": "古朗月行(节选)",
                "content": "《古朗月行(节选)》\n唐·李白\n小时不识月，呼作白玉盘。\n又疑瑶台镜，飞在青云端。",
                "type": "古诗词"
            },
            {
                "title": "风",
                "content": "《风》\n唐·李峤\n解落三秋叶，能开二月花。\n过江千尺浪，入竹万竿斜。",
                "type": "古诗词"
            },
            {
                "title": "春晓",
                "content": "《春晓》\n唐·孟浩然\n春眠不觉晓，处处闻啼鸟。\n夜来风雨声，花落知多少。",
                "type": "古诗词"
            },
            {
                "title": "赠汪伦",
                "content": "《赠汪伦》\n唐·李白\n李白乘舟将欲行，忽闻岸上踏歌声。\n桃花潭水深千尺，不及汪伦送我情。",
                "type": "古诗词"
            },
            {
                "title": "静夜思",
                "content": "《静夜思》\n唐·李白\n床前明月光，疑是地上霜。\n举头望明月，低头思故乡。",
                "type": "古诗词"
            },
            {
                "title": "寻隐者不遇",
                "content": "《寻隐者不遇》\n唐·贾岛\n松下问童子，言师采药去。\n只在此山中，云深不知处。",
                "type": "古诗词"
            },
            {
                "title": "池上",
                "content": "《池上》\n唐·白居易\n小娃撑小艇，偷采白莲回。\n不解藏踪迹，浮萍一道开。",
                "type": "古诗词"
            },
            {
                "title": "小池",
                "content": "《小池》\n宋·杨万里\n泉眼无声惜细流，树阴照水爱晴柔。\n小荷才露尖尖角，早有蜻蜓立上头。",
                "type": "古诗词"
            },
            {
                "title": "画鸡",
                "content": "《画鸡》\n明·唐寅\n头上红冠不用裁，满身雪白走将来。\n平生不敢轻言语，一叫千门万户开。",
                "type": "古诗词"
            },
            {
                "title": "梅花",
                "content": "《梅花》\n宋·王安石\n墙角数枝梅，凌寒独自开。\n遥知不是雪，为有暗香来。",
                "type": "古诗词"
            },
            {
                "title": "小儿垂钓",
                "content": "《小儿垂钓》\n唐·胡令能\n蓬头稚子学垂纶，侧坐莓苔草映身。\n路人借问遥招手，怕得鱼惊不应人。",
                "type": "古诗词"
            },
            {
                "title": "登鹳雀楼",
                "content": "《登鹳雀楼》\n唐·王之涣\n白日依山尽，黄河入海流。\n欲穷千里目，更上一层楼。",
                "type": "古诗词"
            },
            {
                "title": "望庐山瀑布",
                "content": "《望庐山瀑布》\n唐·李白\n日照香炉生紫烟，遥看瀑布挂前川。\n飞流直下三千尺，疑是银河落九天。",
                "type": "古诗词"
            },
            {
                "title": "江雪",
                "content": "《江雪》\n唐·柳宗元\n千山鸟飞绝，万径人踪灭。\n孤舟蓑笠翁，独钓寒江雪。",
                "type": "古诗词"
            },
            {
                "title": "夜宿山寺",
                "content": "《夜宿山寺》\n唐·李白\n危楼高百尺，手可摘星辰。\n不敢高声语，恐惊天上人。",
                "type": "古诗词"
            },
            {
                "title": "敕勒歌",
                "content": "《敕勒歌》\n北朝民歌\n敕勒川，阴山下。\n天似穹庐，笼盖四野。\n天苍苍，野茫茫，风吹草低见(xiàn)牛羊。",
                "type": "古诗词"
            },
            {
                "title": "村居",
                "content": "《村居》\n清·高鼎\n草长莺飞二月天，拂堤杨柳醉春烟。\n儿童散学归来早，忙趁东风放纸鸢。",
                "type": "古诗词"
            },
            {
                "title": "咏柳",
                "content": "《咏柳》\n唐·贺知章\n碧玉妆成一树高，万条垂下绿丝绦。\n不知细叶谁裁出，二月春风似剪刀。",
                "type": "古诗词"
            },
            {
                "title": "赋得古原草送别(节选)",
                "content": "《赋得古原草送别(节选)》\n唐·白居易\n离离原上草，一岁一枯荣。\n野火烧不尽，春风吹又生。",
                "type": "古诗词"
            },
            {
                "title": "晓出净慈寺送林子方",
                "content": "《晓出净慈寺送林子方》\n宋·杨万里\n毕竟西湖六月中，风光不与四时同。\n接天莲叶无穷碧，映日荷花别样红。",
                "type": "古诗词"
            },
            {
                "title": "绝句",
                "content": "《绝句》\n唐·杜甫\n两个黄鹂鸣翠柳，一行白鹭上青天。\n窗含西岭千秋雪，门泊东吴万里船。",
                "type": "古诗词"
            },
            {
                "title": "悯农(其一)",
                "content": "《悯农(其一)》\n唐·李绅\n春种一粒粟，秋收万颗子。\n四海无闲田，农夫犹饿死。",
                "type": "古诗词"
            },
            {
                "title": "舟夜书所见",
                "content": "《舟夜书所见》\n清·查慎行\n月黑见渔灯，孤光一点萤。\n微微风簇浪，散作满河星。",
                "type": "古诗词"
            },
            {
                "title": "所见",
                "content": "《所见》\n清·袁枚\n牧童骑黄牛，歌声振林樾。\n意欲捕鸣蝉，忽然闭口立。",
                "type": "古诗词"
            },
            {
                "title": "山行",
                "content": "《山行》\n唐·杜牧\n远上寒山石径斜(xié)，白云生处有人家。\n停车坐爱枫林晚，霜叶红于二月花。",
                "type": "古诗词"
            },
            {
                "title": "赠刘景文",
                "content": "《赠刘景文》\n宋·苏轼\n荷尽已无擎雨盖，菊残犹有傲霜枝。\n一年好景君须记，最是橙黄橘绿时。",
                "type": "古诗词"
            },
            {
                "title": "夜书所见",
                "content": "《夜书所见》\n宋·叶绍翁\n萧萧梧叶送寒声，江上秋风动客情。\n知有儿童挑促织，夜深篱落一灯明。",
                "type": "古诗词"
            },
            {
                "title": "望天门山",
                "content": "《望天门山》\n唐·李白\n天门中断楚江开，碧水东流至此回。\n两岸青山相对出，孤帆一片日边来。",
                "type": "古诗词"
            },
            {
                "title": "饮湖上初晴后雨",
                "content": "《饮湖上初晴后雨》\n宋·苏轼\n水光潋滟晴方好，山色空蒙雨亦奇。\n欲把西湖比西子，淡妆浓抹总相宜。",
                "type": "古诗词"
            },
            {
                "title": "望洞庭",
                "content": "《望洞庭》\n唐·刘禹锡\n湖光秋月两相和，潭面无风镜未磨。\n遥望洞庭山水翠，白银盘里一青螺。",
                "type": "古诗词"
            },
            {
                "title": "早发白帝城",
                "content": "《早发白帝城》\n唐·李白\n朝辞白帝彩云间，千里江陵一日还。\n两岸猿声啼不住，轻舟已过万重山。",
                "type": "古诗词"
            },
            {
                "title": "采莲曲",
                "content": "《采莲曲》\n唐·王昌龄\n荷叶罗裙一色裁，芙蓉向脸两边开。\n乱入池中看不见，闻歌始觉有人来。",
                "type": "古诗词"
            },
            {
                "title": "元日",
                "content": "《元日》\n宋·王安石\n爆竹声中一岁除，春风送暖入屠苏。\n千门万户曈曈日，总把新桃换旧符。",
                "type": "古诗词"
            },
            {
                "title": "清明",
                "content": "《清明》\n唐·杜牧\n清明时节雨纷纷，路上行人欲断魂。\n借问酒家何处有？牧童遥指杏花村。",
                "type": "古诗词"
            },
            {
                "title": "九月九日忆山东兄弟",
                "content": "《九月九日忆山东兄弟》\n唐·王维\n独在异乡为异客，每逢佳节倍思亲。\n遥知兄弟登高处，遍插茱萸少一人。",
                "type": "古诗词"
            },
            {
                "title": "滁州西涧",
                "content": "《滁州西涧》\n唐·韦应物\n独怜幽草涧边生，上有黄鹂深树鸣。\n春潮带雨晚来急，野渡无人舟自横。",
                "type": "古诗词"
            },
            {
                "title": "大林寺桃花",
                "content": "《大林寺桃花》\n唐·白居易\n人间四月芳菲尽，山寺桃花始盛开。\n长恨春归无觅处，不知转入此中来。",
                "type": "古诗词"
            },
            {
                "title": "惠崇春江晚景",
                "content": "《惠崇春江晚景》\n宋·苏轼\n竹外桃花三两枝，春江水暖鸭先知。\n蒌蒿满地芦芽短，正是河豚欲上时。",
                "type": "古诗词"
            },
            {
                "title": "三衢道中",
                "content": "《三衢道中》\n宋·曾几\n梅子黄时日日晴，小溪泛尽却山行。\n绿阴不减来时路，添得黄鹂四五声。",
                "type": "古诗词"
            },
            {
                "title": "忆江南",
                "content": "《忆江南》\n唐·白居易\n江南好，风景旧曾谙。\n日出江花红胜火，春来江水绿如蓝。能不忆江南？",
                "type": "古诗词"
            },
            {
                "title": "鹿柴",
                "content": "《鹿柴》\n唐·王维\n空山不见人，但闻人语响。\n返景入深林，复照青苔上。",
                "type": "古诗词"
            },
            {
                "title": "暮江吟",
                "content": "《暮江吟》\n唐·白居易\n一道残阳铺水中，半江瑟瑟半江红。\n可怜九月初三夜，露似真珠月似弓。",
                "type": "古诗词"
            },
            {
                "title": "题西林壁",
                "content": "《题西林壁》\n宋·苏轼\n横看成岭侧成峰，远近高低各不同。\n不识庐山真面目，只缘身在此山中。",
                "type": "古诗词"
            },
            {
                "title": "雪梅",
                "content": "《雪梅》\n宋·卢钺\n梅雪争春未肯降，骚人阁笔费评章。\n梅须逊雪三分白，雪却输梅一段香。",
                "type": "古诗词"
            },
            {
                "title": "嫦娥",
                "content": "《嫦娥》\n唐·李商隐\n云母屏风烛影深，长河渐落晓星沉。\n嫦娥应悔偷灵药，碧海青天夜夜心。",
                "type": "古诗词"

    "content": "《唐雎不辱使命》\n《战国策》\n秦王使人谓安陵君曰：\"寡人欲以五百里之地易安陵，安陵君其许寡人！\"安陵君曰：\"大王加惠，以大易小，甚善；虽然，受地于先王，愿终守之，弗敢易！\"秦王不说。安陵君因使唐雎使于秦。\n秦王谓唐雎曰：\"寡人以五百里之地易安陵，安陵君不听寡人，何也？且秦灭韩亡魏，而君以五十里之地存者，以君为长者，故不错意也。今吾以十倍之地，请广于君，而君逆寡人者，轻寡人与？\"唐雎对曰：\"否，非若是也。安陵君受地于先王而守之，虽千里不敢易也，岂直五百里哉？\"\n秦王怫然怒，谓唐雎曰：\"公亦尝闻天子之怒乎？\"唐雎对曰：\"臣未尝闻也。\"秦王曰：\"天子之怒，伏尸百万，流血千里。\"唐雎曰：\"大王尝闻布衣之怒乎？\"秦王曰：\"布衣之怒，亦免冠徒跣，以头抢地尔。\"唐雎曰：\"此庸夫之怒也，非士之怒也。夫专诸之刺王僚也，彗星袭月；聂政之刺韩傀也，白虹贯日；要离之刺庆忌也，仓鹰击于殿上。此三子者，皆布衣之士也，怀怒未发，休祲降于天，与臣而将四矣。若士必怒，伏尸二人，流血五步，天下缟素，今日是也。\"挺剑而起。\n秦王色挠，长跪而谢之曰：\"先生坐！何至于此！寡人谕矣：夫韩、魏灭亡，而安陵以五十里之地存者，徒以有先生也。\"",

    "content": "《送东阳马生序》（节选）\n明·宋濂\n余幼时即嗜学。家贫，无从致书以观，每假借于藏书之家，手自笔录，计日以还。天大寒，砚冰坚，手指不可屈伸，弗之怠。录毕，走送之，不敢稍逾约。以是人多以书假余，余因得遍观群书。既加冠，益慕圣贤之道。又患无硕师名人与游，尝趋百里外，从乡之先达执经叩问。先达德隆望尊，门人弟子填其室，未尝稍降辞色。余立侍左右，援疑质理，俯身倾耳以请；或遇其叱咄，色愈恭，礼愈至，不敢出一言以复；俟其欣悦，则又请焉。故余虽愚，卒获有所闻。\n当余之从师也，负箧曳屣行深山巨谷中。穷冬烈风，大雪深数尺，足肤皲裂而不知。至舍，四支僵劲不能动，媵人持汤沃灌，以衾拥覆，久而乃和。寓逆旅，主人日再食，无鲜肥滋味之享。同舍生皆被绮绣，戴朱缨宝饰之帽，腰白玉之环，左佩刀，右备容臭，烨然若神人；余则缊袍敝衣处其间，略无慕艳意，以中有足乐者，不知口体之奉不若人也。盖余之勤且艰若此。",

    "content": "《曹刿论战》\n《左传》\n十年春，齐师伐我。公将战，曹刿请见。其乡人曰：\"肉食者谋之，又何间焉？\"刿曰：\"肉食者鄙，未能远谋。\"乃入见。问：\"何以战？\"公曰：\"衣食所安，弗敢专也，必以分人。\"对曰：\"小惠未遍，民弗从也。\"公曰：\"牺牲玉帛，弗敢加也，必以信。\"对曰：\"小信未孚，神弗福也。\"公曰：\"小大之狱，虽不能察，必以情。\"对曰：\"忠之属也。可以一战。战则请从。\"\n公与之乘，战于长勺。公将鼓之。刿曰：\"未可。\"齐人三鼓。刿曰：\"可矣。\"齐师败绩。公将驰之。刿曰：\"未可。\"下视其辙，登轼而望之，曰：\"可矣。\"遂逐齐师。\n既克，公问其故。对曰：\"夫战，勇气也。一鼓作气，再而衰，三而竭。彼竭我盈，故克之。夫大国，难测也，惧有伏焉。吾视其辙乱，望其旗靡，故逐之。\"",

        let isChecking = false;
        let currentPoem = null;
        let intervalId;
        let currentType = ""; // 记录当前抽查类型
        // 保存按钮初始文字
        const btnTexts = {
            gushi: "古诗词",
            wenyan: "文言文"
        };

        function getResultTextEl() {
            return document.getElementById('resultText');
        }

        function updateSpeakBtn() {
            const btn = document.getElementById('speakBtn');
            if (!btn) return;
            if (currentPoem) btn.classList.remove('speak-btn--hidden');
            else btn.classList.add('speak-btn--hidden');
            const syn = window.speechSynthesis;
            if (!syn || (!syn.speaking && !syn.pending)) {
                btn.classList.remove('speak-btn--playing');
            }
        }

        function stopSpeech() {
            if ('speechSynthesis' in window) speechSynthesis.cancel();
            const btn = document.getElementById('speakBtn');
            if (btn) btn.classList.remove('speak-btn--playing');
        }

        function textForSpeech(poem) {
            if (!poem || !poem.content) return '';
            return poem.content.replace(/\n/g, '，');
        }

        function pickChineseVoice() {
            const list = speechSynthesis.getVoices();
            let v = list.find(x => x.lang && /^zh(-|$)/i.test(x.lang));
            if (!v) v = list.find(x => /Chinese|中文|Mandarin|普通话|国语/i.test(x.name || ''));
            return v || null;
        }

        function speakCurrentPoem() {
            if (!currentPoem) return;
            if (!('speechSynthesis' in window)) {
                alert('当前浏览器不支持语音朗读');
                return;
            }
            if (speechSynthesis.speaking || speechSynthesis.pending) {
                stopSpeech();
                return;
            }
            const text = textForSpeech(currentPoem);
            if (!text.trim()) return;
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-CN';
            const voice = pickChineseVoice();
            if (voice) u.voice = voice;
            u.rate = 0.92;
            const btn = document.getElementById('speakBtn');
            u.onend = () => { if (btn) btn.classList.remove('speak-btn--playing'); };
            u.onerror = () => { if (btn) btn.classList.remove('speak-btn--playing'); };
            if (btn) btn.classList.add('speak-btn--playing');
            speechSynthesis.speak(u);
        }

        document.getElementById('speakBtn').addEventListener('click', () => speakCurrentPoem());

        if ('speechSynthesis' in window) {
            speechSynthesis.getVoices();
            speechSynthesis.addEventListener('voiceschanged', () => speechSynthesis.getVoices());
        }

        function toggleCheck(type) {
            // 获取对应的按钮
            const gushiBtn = document.getElementById('gushiBtn');
            const wenyanBtn = document.getElementById('wenyanBtn');
            const resultDiv = document.getElementById('result');
            
            // 清除之前的定时器（防止多个定时器同时运行）
            clearInterval(intervalId);
            stopSpeech();
            
            // 如果当前正在抽查且点击的是同一个按钮，则停止抽查
            if (isChecking && currentType === type) {
                isChecking = false;
                currentType = "";
                // 移除所有按钮的active状态并恢复初始文字
                gushiBtn.classList.remove('active');
                wenyanBtn.classList.remove('active');
                gushiBtn.textContent = btnTexts.gushi;
                wenyanBtn.textContent = btnTexts.wenyan;
                
                // 停止时保持当前题目，避免二次点击又跳到新题
                if (currentPoem) {
                    getResultTextEl().textContent = currentPoem.title;
                    resultDiv.classList.remove('answer-mode');
                    adjustTextSize(resultDiv);
                } else {
                    const filteredPoems = poems.filter(p => p.type === type);
                    if (filteredPoems.length > 0) {
                        currentPoem = filteredPoems[Math.floor(Math.random() * filteredPoems.length)];
                        getResultTextEl().textContent = currentPoem.title;
                        resultDiv.classList.remove('answer-mode');
                        adjustTextSize(resultDiv);
                    } else {
                        currentPoem = null;
                        getResultTextEl().textContent = "暂无该类型内容";
                    }
                }
                updateSpeakBtn();
            } else {
                // 开始抽查
                isChecking = true;
                currentType = type;
                
                // 移除所有按钮的active状态
                gushiBtn.classList.remove('active');
                wenyanBtn.classList.remove('active');
                // 切换抽查类型时，先把两个按钮文字恢复为初始值，避免残留上一次的标题
                gushiBtn.textContent = btnTexts.gushi;
                wenyanBtn.textContent = btnTexts.wenyan;
                
                // 给当前点击的按钮添加active状态
                if (type === "古诗词") {
                    gushiBtn.classList.add('active');
                } else {
                    wenyanBtn.classList.add('active');
                }
                
                // 筛选对应类型的内容
                const filteredPoems = poems.filter(p => p.type === type);
                
                if (filteredPoems.length === 0) {
                    currentPoem = null;
                    getResultTextEl().textContent = "暂无该类型内容";
                    updateSpeakBtn();
                    return;
                }

                let shuffledPoems = shuffleArray(filteredPoems);
                let index = 0;
                intervalId = setInterval(() => {
                    stopSpeech();
                    if (index >= shuffledPoems.length) {
                        shuffledPoems = shuffleArray(filteredPoems);
                        index = 0;
                    }
                    currentPoem = shuffledPoems[index];
                    // 更新按钮文字为当前标题
                    if (type === "古诗词") {
                        gushiBtn.textContent = currentPoem.title;
                        wenyanBtn.textContent = btnTexts.wenyan;
                    } else {
                        wenyanBtn.textContent = currentPoem.title;
                        gushiBtn.textContent = btnTexts.gushi;
                    }
                    getResultTextEl().textContent = currentPoem.title;
                    resultDiv.classList.remove('answer-mode');
                    // 抽查滚动时也做一次字体自适应，避免标题过长溢出
                    resultDiv.style.fontSize = window.innerWidth <= 768 ? '1.5rem' : '1.8rem';
                    adjustTextSize(resultDiv);
                    updateSpeakBtn();
                    index++;
                }, 100);
            }
        }

        function showAnswer() {
            if (currentPoem) {
                const resultDiv = document.getElementById('result');
                getResultTextEl().textContent = currentPoem.content;
                // 古诗词答案居中；文言文答案左上对齐，便于长文滚动阅读
                if (currentPoem.type === "文言文") {
                    resultDiv.classList.add('answer-mode');
                } else {
                    resultDiv.classList.remove('answer-mode');
                }
                // 字体大小保持与之前一致，仅修复长内容滚动显示问题
                resultDiv.style.fontSize = window.innerWidth <= 768 ? '1.5rem' : '1.8rem';
                resultDiv.scrollTop = 0;
                adjustTextSize(resultDiv);
                updateSpeakBtn();
            } else {
                // 提示用户先选择抽查类型
                alert("请先点击古诗词或文言文按钮开始抽查！");
            }
        }

        function shuffleArray(arr) {
            const shuffled = [...arr];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function adjustTextSize(element) {
            let fontSize = parseInt(getComputedStyle(element).fontSize);
            // 最小字体限制为12px，保证可读性
            while (element.scrollHeight > element.clientHeight && fontSize > 12) {
                fontSize -= 1;
                element.style.fontSize = `${fontSize}px`;
            }
        }

        // 窗口尺寸变化时自动调整
        window.addEventListener('resize', () => {
            const resultDiv = document.getElementById('result');
            adjustTextSize(resultDiv);
        });

        // 页面卸载前清除定时器，防止内存泄漏
        window.addEventListener('beforeunload', () => {
            clearInterval(intervalId);
            stopSpeech();
        });
    </script>
